<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    color:white;

    background:
    linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
    url("https://images.unsplash.com/photo-1556740738-b6a63e27c4df");

    background-size:cover;
}

.navbar {
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(0,0,0,0.6);
}

.navbar h2 { margin:0; }

.logout {
    cursor:pointer;
    color:#ff7675;
}

.container {
    text-align:center;
    margin-top:60px;
}

.balance-card {
    background:rgba(255,255,255,0.1);
    display:inline-block;
    padding:25px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    margin-bottom:40px;
    animation: fadeIn 1s;
}

.cards {
    display:flex;
    justify-content:center;
    gap:30px;
}

.card {
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:15px;
    width:180px;
    cursor:pointer;
    transition:0.3s;
    backdrop-filter: blur(10px);
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    background:rgba(255,255,255,0.2);
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1;}
}
</style>

<script>
window.onload=function(){
 let user=JSON.parse(localStorage.getItem("currentUser"));
 document.getElementById("bal").innerText=user.balance;
}

function logout(){
 localStorage.removeItem("currentUser");
 window.location="login.html";
}
</script>

</head>

<body>

<div class="navbar">
<h2>🏦 Smart Bank</h2>
<div class="logout" onclick="logout()">
<i class="fas fa-sign-out-alt"></i> Logout
</div>
</div>

<div class="container">

<div class="balance-card">
<h3><i class="fas fa-wallet"></i> Balance</h3>
<h1>₹ <span id="bal"></span></h1>
</div>

<div class="cards">
<div class="card" onclick="location.href='transfer.html'">
<i class="fas fa-paper-plane fa-2x"></i>
<h3>Transfer</h3>
</div>

<div class="card" onclick="location.href='statement.html'">
<i class="fas fa-file-alt fa-2x"></i>
<h3>Statement</h3>
</div>
</div>

</div>

</body>
</html>
